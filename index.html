<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="background-texture"></div>
  <main class="app-container">
    <nav class="app-nav">
      <div class="nav-logo">🍀 Lotto</div>
      <ul class="nav-links">
        <li><a href="#generator">추첨기</a></li>
        <li><a href="#contact">문의하기</a></li>
      </ul>
    </nav>

    <header class="app-header" id="generator">
      <h1>오늘의 <span class="accent">로또</span> 번호</h1>
      <p>행운의 번호를 생성해 보세요!</p>
    </header>

    <section class="generator-section">
      <div id="ball-container" class="ball-container">
        <!-- Lotto balls will be generated here -->
        <div class="placeholder">버튼을 눌러 번호를 생성하세요</div>
      </div>
      <button id="generate-btn" class="generate-btn">번호 생성하기</button>
    </section>

    <hr class="divider" id="contact">

    <section class="contact-section">
      <h3>의견 보내기</h3>
      <p>궁금한 점이나 제안할 내용이 있다면 알려주세요!</p>
      <form id="contact-form" action="https://formspree.io/f/xeerypqg" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" name="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">메시지</label>
          <textarea name="message" id="message" rows="4" placeholder="내용을 입력해주세요..." required></textarea>
        </div>
        <button type="submit" id="submit-btn" class="submit-btn">보내기</button>
        <p id="form-status" class="form-status"></p>
      </form>
    </section>

    <footer class="app-footer">
      <p>&copy; 2026 Lotto Generator. All rights reserved.</p>
    </footer>
  </main>
  <script type="module" src="/main.js"></script>
</body>
</html>
